<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1400 900" width="1400" height="900" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.10"/>
    </filter>

    <!-- Azure VNet icon (simplified) -->
    <symbol id="icon-vnet" viewBox="0 0 48 48">
      <rect x="4" y="8" width="40" height="32" rx="3" fill="none" stroke="#0078D4" stroke-width="2.5"/>
      <circle cx="16" cy="20" r="4" fill="#0078D4"/>
      <circle cx="32" cy="20" r="4" fill="#0078D4"/>
      <circle cx="16" cy="32" r="4" fill="#0078D4"/>
      <circle cx="32" cy="32" r="4" fill="#0078D4"/>
      <line x1="16" y1="20" x2="32" y2="20" stroke="#0078D4" stroke-width="1.5"/>
      <line x1="16" y1="32" x2="32" y2="32" stroke="#0078D4" stroke-width="1.5"/>
      <line x1="16" y1="20" x2="16" y2="32" stroke="#0078D4" stroke-width="1.5"/>
      <line x1="32" y1="20" x2="32" y2="32" stroke="#0078D4" stroke-width="1.5"/>
    </symbol>

    <!-- Azure Subnet icon -->
    <symbol id="icon-subnet" viewBox="0 0 48 48">
      <rect x="6" y="10" width="36" height="28" rx="2" fill="none" stroke="#0078D4" stroke-width="2" stroke-dasharray="4 2"/>
      <circle cx="18" cy="24" r="3.5" fill="#50A0D8"/>
      <circle cx="30" cy="24" r="3.5" fill="#50A0D8"/>
      <line x1="21.5" y1="24" x2="26.5" y2="24" stroke="#50A0D8" stroke-width="1.5"/>
    </symbol>

    <!-- Power BI icon (gold bar chart) -->
    <symbol id="icon-powerbi" viewBox="0 0 48 48">
      <rect x="2" y="2" width="44" height="44" rx="6" fill="#F2C811"/>
      <rect x="10" y="24" width="6" height="16" rx="1" fill="#fff"/>
      <rect x="21" y="16" width="6" height="24" rx="1" fill="#fff"/>
      <rect x="32" y="8" width="6" height="32" rx="1" fill="#fff"/>
    </symbol>

    <!-- VNet Gateway icon -->
    <symbol id="icon-gateway" viewBox="0 0 48 48">
      <path d="M24 4 L42 18 L42 40 L6 40 L6 18 Z" fill="#0078D4" stroke="#005A9E" stroke-width="1"/>
      <rect x="18" y="22" width="12" height="14" rx="1" fill="#fff"/>
      <line x1="24" y1="22" x2="24" y2="36" stroke="#0078D4" stroke-width="1.5"/>
      <line x1="18" y1="29" x2="30" y2="29" stroke="#0078D4" stroke-width="1.5"/>
    </symbol>

    <!-- Private Endpoint icon (shield with link) -->
    <symbol id="icon-pe" viewBox="0 0 48 48">
      <circle cx="24" cy="24" r="20" fill="#107C10" stroke="#0B5C0B" stroke-width="1"/>
      <path d="M16 24 h4 a4 4 0 0 1 0 8 h-4 a4 4 0 0 1 0-8z" fill="none" stroke="#fff" stroke-width="2"/>
      <path d="M28 24 h4 a4 4 0 0 1 0-8 h-4 a4 4 0 0 1 0 8z" fill="none" stroke="#fff" stroke-width="2" transform="rotate(180 30 24)"/>
      <line x1="20" y1="24" x2="28" y2="24" stroke="#fff" stroke-width="2"/>
    </symbol>

    <!-- SQL Database icon (cylinder) -->
    <symbol id="icon-sql" viewBox="0 0 48 48">
      <ellipse cx="24" cy="12" rx="16" ry="6" fill="#0078D4"/>
      <rect x="8" y="12" width="32" height="24" fill="#0078D4"/>
      <ellipse cx="24" cy="36" rx="16" ry="6" fill="#005A9E"/>
      <ellipse cx="24" cy="12" rx="16" ry="6" fill="#3A96DD"/>
      <text x="24" y="28" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold" font-family="Segoe UI, Arial">SQL</text>
    </symbol>

    <!-- DNS Zone icon (hexagon) -->
    <symbol id="icon-dns" viewBox="0 0 48 48">
      <polygon points="24,2 44,14 44,34 24,46 4,34 4,14" fill="#D83B01" stroke="#A52C00" stroke-width="1"/>
      <text x="24" y="22" text-anchor="middle" fill="#fff" font-size="9" font-weight="bold" font-family="Segoe UI, Arial">DNS</text>
      <text x="24" y="33" text-anchor="middle" fill="#fff" font-size="7" font-family="Segoe UI, Arial">ZONE</text>
    </symbol>
  </defs>
    <!-- Arrow markers in each flow color -->
    <marker id="arrowGold" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#D4A012"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#107C10"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0078D4"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#D83B01"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1400" height="900" fill="#FAFBFC" rx="4"/>

  <!-- ==================== TITLE ==================== -->
  <text x="700" y="35" text-anchor="middle" font-size="22" font-weight="700" fill="#23272F">Power BI → Azure SQL via Private Link</text>
  <text x="700" y="57" text-anchor="middle" font-size="13" fill="#888">Resource Group: <tspan font-weight="600" fill="#555">rg-pbi-pl-demo-2</tspan> (centralus)</text>

  <!-- ==================== POWER BI SERVICE ==================== -->
  <g filter="url(#shadow)">
    <use xlink:href="#icon-powerbi" x="676" y="75" width="48" height="48"/>
  </g>
  <text x="700" y="140" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Power BI Service</text>
  <text x="700" y="155" text-anchor="middle" font-size="10" fill="#888">(Microsoft Cloud)</text>

  <!-- ==================== AZURE VNET CONTAINER ==================== -->
  <rect x="120" y="230" width="1160" height="330" rx="12" ry="12" fill="#E8F4FD" stroke="#0078D4" stroke-width="2.5" stroke-dasharray="10 5" filter="url(#shadow)"/>
  <use xlink:href="#icon-vnet" x="138" y="238" width="32" height="32"/>
  <text x="178" y="261" font-size="13" font-weight="700" fill="#0078D4">Azure VNet</text>
  <text x="282" y="261" font-size="12" fill="#555">pbi-pl-demo-vnet · 10.0.0.0/16</text>

  <!-- ===== GATEWAY SUBNET ===== -->
  <rect x="150" y="290" width="460" height="250" rx="8" ry="8" fill="#F8F9FA" stroke="#5EA4E0" stroke-width="1.5" stroke-dasharray="6 3"/>
  <use xlink:href="#icon-subnet" x="160" y="296" width="24" height="24"/>
  <text x="190" y="314" font-size="12" font-weight="700" fill="#333">gateway subnet</text>
  <text x="310" y="314" font-size="11" fill="#555">· 10.0.2.0/24</text>
  <text x="165" y="332" font-size="9" fill="#999">Delegation: Microsoft.PowerPlatform/vnetaccesslinks</text>

  <g filter="url(#shadow)">
    <use xlink:href="#icon-gateway" x="345" y="375" width="48" height="48"/>
  </g>
  <text x="369" y="438" text-anchor="middle" font-size="13" font-weight="700" fill="#333">VNet Data Gateway</text>
  <text x="369" y="454" text-anchor="middle" font-size="10" fill="#888">(Power Platform managed)</text>

  <!-- ===== DEFAULT SUBNET ===== -->
  <rect x="680" y="290" width="570" height="250" rx="8" ry="8" fill="#F8F9FA" stroke="#5EA4E0" stroke-width="1.5" stroke-dasharray="6 3"/>
  <use xlink:href="#icon-subnet" x="690" y="296" width="24" height="24"/>
  <text x="720" y="314" font-size="12" font-weight="700" fill="#333">default subnet</text>
  <text x="830" y="314" font-size="11" fill="#555">· 10.0.1.0/24</text>

  <g filter="url(#shadow)">
    <use xlink:href="#icon-pe" x="930" y="375" width="48" height="48"/>
  </g>
  <text x="954" y="440" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Private Endpoint</text>
  <text x="954" y="456" text-anchor="middle" font-size="10" fill="#555">pbi-pl-demo-pe-sql</text>
  <text x="954" y="472" text-anchor="middle" font-size="10" font-weight="600" fill="#107C10">NIC: 10.0.1.4</text>

  <!-- ==================== AZURE SQL DATABASE ==================== -->
  <g filter="url(#shadow)">
    <use xlink:href="#icon-sql" x="1086" y="620" width="48" height="48"/>
  </g>
  <text x="1110" y="690" text-anchor="middle" font-size="13" font-weight="700" fill="#0078D4">Azure SQL Database</text>
  <text x="1110" y="706" text-anchor="middle" font-size="10" fill="#555">Server: pbi-pl-demo-sql</text>
  <text x="1110" y="720" text-anchor="middle" font-size="10" fill="#555">DB: ContosoRetail</text>
  <text x="1110" y="742" text-anchor="middle" font-size="11" font-weight="700" fill="#D13438">🔒 Public Access: DISABLED</text>

  <!-- ==================== PRIVATE DNS ZONE ==================== -->
  <g filter="url(#shadow)">
    <use xlink:href="#icon-dns" x="280" y="638" width="48" height="48"/>
  </g>
  <text x="304" y="712" text-anchor="middle" font-size="13" font-weight="700" fill="#D83B01">Private DNS Zone</text>
  <text x="304" y="728" text-anchor="middle" font-size="10" fill="#888">privatelink.database.windows.net</text>
  <text x="304" y="744" text-anchor="middle" font-size="10" font-weight="600" fill="#D83B01">A record → 10.0.1.4</text>

  <!-- ==================== FLOW ARROWS ==================== -->

  <!-- ❶ Gold: Power BI → VNet Data Gateway -->
  <path d="M700,130 L700,195 L369,195 L369,380" fill="none" stroke="#D4A012" stroke-width="2.5" marker-end="url(#arrowGold)"/>
  <rect x="460" y="175" width="178" height="28" rx="14" fill="white" stroke="#D4A012" stroke-width="1" opacity="0.95"/>
  <text x="549" y="194" text-anchor="middle" font-size="11" font-weight="600" fill="#D4A012">❶ Managed Connection</text>

  <!-- ❷ Green: VNet Data Gateway → Private Endpoint -->
  <path d="M393,400 L650,400 L930,400" fill="none" stroke="#107C10" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <rect x="582" y="358" width="220" height="28" rx="14" fill="white" stroke="#107C10" stroke-width="1" opacity="0.95"/>
  <text x="692" y="377" text-anchor="middle" font-size="11" font-weight="600" fill="#107C10">❷ Private Network (within VNet)</text>

  <!-- ❸ Blue: Private Endpoint → Azure SQL -->
  <path d="M954,423 L954,590 L1110,590 L1110,620" fill="none" stroke="#0078D4" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <rect x="975" y="574" width="178" height="28" rx="14" fill="white" stroke="#0078D4" stroke-width="1" opacity="0.95"/>
  <text x="1064" y="593" text-anchor="middle" font-size="11" font-weight="600" fill="#0078D4">❸ Private Link Connection</text>

  <!-- ❹ Orange dashed: VNet → Private DNS Zone -->
  <path d="M369,454 L369,600 L304,600 L304,640" fill="none" stroke="#D83B01" stroke-width="2" stroke-dasharray="8 4" marker-end="url(#arrowOrange)"/>
  <rect x="210" y="580" width="210" height="28" rx="14" fill="white" stroke="#D83B01" stroke-width="1" opacity="0.95"/>
  <text x="315" y="599" text-anchor="middle" font-size="11" font-weight="600" fill="#D83B01">❹ DNS Resolution → 10.0.1.4</text>

  <!-- ==================== LEGEND ==================== -->
  <rect x="20" y="780" width="360" height="108" rx="8" ry="8" fill="#F5F5F5" stroke="#CCCCCC" stroke-width="1"/>
  <text x="38" y="802" font-size="12" font-weight="700" fill="#333">Legend</text>

  <!-- Gold arrow legend -->
  <line x1="38" y1="822" x2="88" y2="822" stroke="#D4A012" stroke-width="2.5"/>
  <polygon points="88,819 95,822 88,825" fill="#D4A012"/>
  <text x="103" y="826" font-size="10" fill="#D4A012" font-weight="600">❶ Managed Connection</text>

  <!-- Green arrow legend -->
  <line x1="38" y1="842" x2="88" y2="842" stroke="#107C10" stroke-width="2.5"/>
  <polygon points="88,839 95,842 88,845" fill="#107C10"/>
  <text x="103" y="846" font-size="10" fill="#107C10" font-weight="600">❷ Private Network</text>

  <!-- Blue arrow legend -->
  <line x1="38" y1="862" x2="88" y2="862" stroke="#0078D4" stroke-width="2.5"/>
  <polygon points="88,859 95,862 88,865" fill="#0078D4"/>
  <text x="103" y="866" font-size="10" fill="#0078D4" font-weight="600">❸ Private Link</text>

  <!-- Orange dashed arrow legend -->
  <line x1="38" y1="882" x2="88" y2="882" stroke="#D83B01" stroke-width="2" stroke-dasharray="8 4"/>
  <polygon points="88,879 95,882 88,885" fill="#D83B01"/>
  <text x="103" y="886" font-size="10" fill="#D83B01" font-weight="600">❹ DNS Resolution (dashed)</text>
</svg>
