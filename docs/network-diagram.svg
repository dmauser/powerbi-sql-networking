<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1400 900" width="1400" height="900" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.10"/>
    </filter>
    <marker id="arrowGold" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#D4A012"/></marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#107C10"/></marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#0078D4"/></marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#D83B01"/></marker>

    <!-- Power BI icon -->
    <symbol id="icon-pbi" viewBox="0 0 48 48">
      <rect width="48" height="48" rx="4" fill="#F2C811"/>
      <rect x="8" y="26" width="8" height="16" rx="2" fill="#fff"/>
      <rect x="20" y="16" width="8" height="26" rx="2" fill="#fff"/>
      <rect x="32" y="6" width="8" height="36" rx="2" fill="#fff"/>
    </symbol>
    <!-- VNet icon -->
    <symbol id="icon-vnet" viewBox="0 0 48 48">
      <path d="M24 2L44 14v20L24 46 4 34V14L24 2z" fill="#0078D4"/>
      <circle cx="16" cy="18" r="3" fill="#fff"/><circle cx="32" cy="18" r="3" fill="#fff"/>
      <circle cx="16" cy="30" r="3" fill="#fff"/><circle cx="32" cy="30" r="3" fill="#fff"/>
      <line x1="16" y1="18" x2="32" y2="18" stroke="#fff" stroke-width="1.5"/>
      <line x1="16" y1="30" x2="32" y2="30" stroke="#fff" stroke-width="1.5"/>
      <line x1="16" y1="18" x2="16" y2="30" stroke="#fff" stroke-width="1.5"/>
      <line x1="32" y1="18" x2="32" y2="30" stroke="#fff" stroke-width="1.5"/>
    </symbol>
    <!-- Subnet icon -->
    <symbol id="icon-subnet" viewBox="0 0 48 48">
      <rect x="4" y="8" width="40" height="32" rx="4" fill="none" stroke="#0078D4" stroke-width="2.5" stroke-dasharray="4 2"/>
      <circle cx="16" cy="24" r="4" fill="#50A0D8"/><circle cx="32" cy="24" r="4" fill="#50A0D8"/>
      <line x1="20" y1="24" x2="28" y2="24" stroke="#50A0D8" stroke-width="2"/>
    </symbol>
    <!-- Gateway icon -->
    <symbol id="icon-gw" viewBox="0 0 48 48">
      <path d="M8 42V16L24 4l16 12v26H8z" fill="#0078D4"/>
      <rect x="14" y="20" width="20" height="3" rx="1" fill="#fff"/>
      <rect x="14" y="26" width="20" height="3" rx="1" fill="#fff"/>
      <rect x="14" y="32" width="20" height="3" rx="1" fill="#fff"/>
      <path d="M24 4L8 16h32L24 4z" fill="#50A0D8"/>
    </symbol>
    <!-- Private Endpoint icon -->
    <symbol id="icon-pe" viewBox="0 0 48 48">
      <circle cx="24" cy="24" r="22" fill="#107C10"/>
      <rect x="16" y="22" width="16" height="14" rx="2" fill="#fff"/>
      <path d="M19 22v-4a5 5 0 0 1 10 0v4" fill="none" stroke="#fff" stroke-width="2.5"/>
      <circle cx="24" cy="29" r="2" fill="#107C10"/>
    </symbol>
    <!-- SQL Database icon -->
    <symbol id="icon-sql" viewBox="0 0 48 48">
      <ellipse cx="24" cy="12" rx="18" ry="8" fill="#50A0D8"/>
      <path d="M6 12v24c0 4.4 8 8 18 8s18-3.6 18-8V12" fill="#0078D4"/>
      <ellipse cx="24" cy="12" rx="18" ry="8" fill="#50A0D8"/>
      <text x="24" y="34" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold" font-family="Segoe UI,Arial">SQL</text>
    </symbol>
    <!-- DNS Zone icon -->
    <symbol id="icon-dns" viewBox="0 0 48 48">
      <polygon points="24,2 44,14 44,34 24,46 4,34 4,14" fill="#D83B01"/>
      <text x="24" y="21" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold" font-family="Segoe UI,Arial">DNS</text>
      <text x="24" y="34" text-anchor="middle" fill="#fff" font-size="8" font-family="Segoe UI,Arial">ZONE</text>
    </symbol>
  </defs>

  <!-- Background -->
  <rect width="1400" height="900" fill="#FAFBFC" rx="4"/>

  <!-- TITLE -->
  <text x="650" y="35" text-anchor="middle" font-size="22" font-weight="700" fill="#23272F">Power BI &#x2192; Azure SQL via Private Link</text>
  <text x="640" y="57" text-anchor="middle" font-size="13" fill="#888">Resource Group: <tspan font-weight="600" fill="#555">rg-pbi-pl-demo-2</tspan> (centralus)</text>

  <!-- POWER BI SERVICE -->
  <g filter="url(#shadow)">
    <use xlink:href="#icon-pbi" x="356" y="80" width="48" height="48"/>
  </g>
  <text x="380" y="145" text-anchor="middle" font-size="13" font-weight="700" fill="#7F6000">Power BI Service</text>
  <text x="380" y="160" text-anchor="middle" font-size="10" fill="#888">(Microsoft Cloud)</text>

  <!-- AZURE VNET CONTAINER -->
  <rect x="160" y="230" width="960" height="310" rx="12" ry="12" fill="#E8F4FD" stroke="#0078D4" stroke-width="2.5" stroke-dasharray="10 5" filter="url(#shadow)"/>
  <use xlink:href="#icon-vnet" x="170" y="235" width="30" height="30"/>
  <text x="208" y="256" font-size="13" font-weight="700" fill="#0078D4">Azure VNet</text>
  <text x="300" y="256" font-size="12" fill="#555">: pbi-pl-demo-vnet (10.0.0.0/16)</text>

  <!-- GATEWAY SUBNET -->
  <rect x="180" y="280" width="430" height="240" rx="8" ry="8" fill="#F0F5FF" stroke="#5EA4E0" stroke-width="1.5" stroke-dasharray="6 3"/>
  <use xlink:href="#icon-subnet" x="190" y="284" width="24" height="24"/>
  <text x="220" y="300" font-size="11" font-weight="700" fill="#333">gateway subnet</text>
  <text x="340" y="300" font-size="11" fill="#555">(10.0.2.0/24)</text>
  <text x="192" y="320" font-size="9" fill="#999">Delegation: Microsoft.PowerPlatform/vnetaccesslinks</text>

  <!-- VNET DATA GATEWAY -->
  <g filter="url(#shadow)">
    <use xlink:href="#icon-gw" x="355" y="360" width="50" height="60"/>
  </g>
  <text x="380" y="438" text-anchor="middle" font-size="13" font-weight="700" fill="#0078D4">VNet Data Gateway</text>
  <text x="380" y="454" text-anchor="middle" font-size="10" fill="#888">(Power Platform managed)</text>

  <!-- DEFAULT SUBNET -->
  <rect x="660" y="280" width="440" height="240" rx="8" ry="8" fill="#F0F5FF" stroke="#5EA4E0" stroke-width="1.5" stroke-dasharray="6 3"/>
  <use xlink:href="#icon-subnet" x="670" y="284" width="24" height="24"/>
  <text x="700" y="300" font-size="11" font-weight="700" fill="#333">default subnet</text>
  <text x="812" y="300" font-size="11" fill="#555">(10.0.1.0/24)</text>

  <!-- PRIVATE ENDPOINT -->
  <g filter="url(#shadow)">
    <use xlink:href="#icon-pe" x="840" y="365" width="50" height="50"/>
  </g>
  <!-- PE label to the right of icon to avoid arrow overlap -->
  <text x="920" y="360" font-size="13" font-weight="700" fill="#107C10">Private Endpoint</text>
  <text x="920" y="376" font-size="10" fill="#555">pbi-pl-demo-pe-sql</text>
  <text x="920" y="392" font-size="10" font-weight="600" fill="#107C10">NIC: 10.0.1.4</text>

  <!-- AZURE SQL DATABASE -->
  <g filter="url(#shadow)">
    <use xlink:href="#icon-sql" x="1040" y="590" width="50" height="55"/>
  </g>
  <text x="1065" y="662" text-anchor="middle" font-size="13" font-weight="700" fill="#0078D4">Azure SQL Database</text>
  <text x="1065" y="678" text-anchor="middle" font-size="10" fill="#555">Server: pbi-pl-demo-sql</text>
  <text x="1065" y="694" text-anchor="middle" font-size="10" fill="#555">DB: ContosoRetail</text>
  <text x="1065" y="716" text-anchor="middle" font-size="11" font-weight="700" fill="#D13438">&#x1f512; Public Access: DISABLED</text>

  <!-- PRIVATE DNS ZONE -->
  <g filter="url(#shadow)">
    <use xlink:href="#icon-dns" x="215" y="605" width="48" height="48"/>
  </g>
  <text x="239" y="672" text-anchor="middle" font-size="13" font-weight="700" fill="#D83B01">Private DNS Zone</text>
  <text x="239" y="688" text-anchor="middle" font-size="10" fill="#888">privatelink.database.windows.net</text>
  <text x="239" y="704" text-anchor="middle" font-size="10" font-weight="600" fill="#D83B01">A record &#x2192; 10.0.1.4</text>

  <!-- FLOW ARROWS -->

  <!-- Arrow 1: Power BI -> VNet Data Gateway (straight down) -->
  <path d="M380,128 L380,360" fill="none" stroke="#D4A012" stroke-width="2.5" marker-end="url(#arrowGold)"/>
  <rect x="200" y="215" width="170" height="24" rx="12" fill="white" stroke="#D4A012" stroke-width="1" opacity="0.95"/>
  <text x="285" y="232" text-anchor="middle" font-size="10" font-weight="600" fill="#7F6000">&#x2776; Managed Connection</text>

  <!-- Arrow 2: VNet Data Gateway -> Private Endpoint -->
  <path d="M405,390 L840,390" fill="none" stroke="#107C10" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <rect x="530" y="366" width="220" height="24" rx="12" fill="white" stroke="#107C10" stroke-width="1" opacity="0.95"/>
  <text x="640" y="383" text-anchor="middle" font-size="10" font-weight="600" fill="#107C10">&#x2777; Private Network (within VNet)</text>

  <!-- Arrow 3: Private Endpoint -> Azure SQL (right then down) -->
  <path d="M890,390 L1065,390 L1065,590" fill="none" stroke="#0078D4" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <rect x="1075" y="470" width="175" height="24" rx="12" fill="white" stroke="#0078D4" stroke-width="1" opacity="0.95"/>
  <text x="1162" y="487" text-anchor="middle" font-size="10" font-weight="600" fill="#0078D4">&#x2778; Private Link Connection</text>

  <!-- Arrow 4: DNS resolution (dashed) -->
  <path d="M395,520 L395,565 L239,565 L239,605" fill="none" stroke="#D83B01" stroke-width="2" stroke-dasharray="8 4" marker-end="url(#arrowOrange)"/>
  <rect x="420" y="548" width="210" height="24" rx="12" fill="white" stroke="#D83B01" stroke-width="1" opacity="0.95"/>
  <text x="525" y="565" text-anchor="middle" font-size="10" font-weight="600" fill="#D83B01">&#x2779; DNS Resolution &#x2192; 10.0.1.4</text>

  <!-- LEGEND -->
  <rect x="20" y="770" width="320" height="108" rx="8" ry="8" fill="#F5F5F5" stroke="#CCCCCC" stroke-width="1"/>
  <text x="38" y="792" font-size="12" font-weight="700" fill="#333">Legend</text>

  <line x1="38" y1="812" x2="88" y2="812" stroke="#D4A012" stroke-width="2.5"/>
  <polygon points="88,809 95,812 88,815" fill="#D4A012"/>
  <text x="103" y="816" font-size="10" fill="#7F6000" font-weight="600">&#x2776; Managed Connection</text>

  <line x1="38" y1="832" x2="88" y2="832" stroke="#107C10" stroke-width="2.5"/>
  <polygon points="88,829 95,832 88,835" fill="#107C10"/>
  <text x="103" y="836" font-size="10" fill="#107C10" font-weight="600">&#x2777; Private Network</text>

  <line x1="38" y1="852" x2="88" y2="852" stroke="#0078D4" stroke-width="2.5"/>
  <polygon points="88,849 95,852 88,855" fill="#0078D4"/>
  <text x="103" y="856" font-size="10" fill="#0078D4" font-weight="600">&#x2778; Private Link</text>

  <line x1="38" y1="872" x2="88" y2="872" stroke="#D83B01" stroke-width="2" stroke-dasharray="8 4"/>
  <polygon points="88,869 95,872 88,875" fill="#D83B01"/>
  <text x="103" y="876" font-size="10" fill="#D83B01" font-weight="600">&#x2779; DNS Resolution (dashed)</text>
</svg>